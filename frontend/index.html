<!-- Azure deployment test -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Scotia Health Registration</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <img src="ns_health_logo.png" alt="Nova Scotia Health Logo" class="logo">
            <h1>Nova Scotia Health Registration</h1>
        </header>

        <!-- Registration Form -->
        <section class="form-section">
            <h2>Patient Information</h2>
            <form id="registrationForm">
                
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>

                <div class="form-group">
                    <label>Health Card Number</label>
                    <input type="text" id="healthCard" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <button type="submit">Submit</button>
            </form>
        </section>

        <!-- Output Section -->
        <section class="output-section">
            <h2>Upcoming Appointments</h2>
            <div id="outputBox">
                <p>No appointment information available yet.</p>
            </div>
        </section>
    </div>

    <!-- UPDATED SCRIPT (Connected to Azure Backend) -->
    <script>
        document.getElementById("registrationForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const healthCard = document.getElementById("healthCard").value;

            fetch("https://ns-health-backend.azurewebsites.net/api/appointments", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    firstName: firstName,
                    lastName: lastName,
                    healthCard: healthCard
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("outputBox").innerHTML = `<p>${data.message}</p>`;
            })
            .catch(err => {
                console.error(err);
                document.getElementById("outputBox").innerHTML = `<p style="color:red;">Error retrieving appointment data.</p>`;
            });
        });
    </script>

</body>
</html>
